<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho WhatsApp - XV Regina</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #6bb8d4;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
        }

        .stat-num {
            font-size: 2rem;
            font-weight: bold;
            color: #6bb8d4;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .config {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .config label {
            display: block;
            color: #6bb8d4;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .config textarea {
            width: 100%;
            background: #0f3460;
            border: 1px solid #444;
            border-radius: 8px;
            color: #eee;
            padding: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 100px;
        }

        .config .hint {
            color: #666;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .config input[text] {
            width: 100%;
            background: #0f3460;
            border: 1px solid #444;
            border-radius: 8px;
            color: #eee;
            padding: 10px;
            font-size: 0.95rem;
        }

        .domain-input {
            width: 100%;
            background: #0f3460;
            border: 1px solid #444;
            border-radius: 8px;
            color: #eee;
            padding: 10px;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }

        .search-bar {
            width: 100%;
            padding: 12px 15px;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 10px;
            color: #eee;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .search-bar::placeholder {
            color: #555;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #0f3460;
            color: #6bb8d4;
            padding: 12px 10px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
        }

        tr:hover {
            background: #1a2a4a;
        }

        tr.sent {
            opacity: 0.5;
        }

        tr.sent td:first-child::after {
            content: ' ✓';
            color: #4CAF50;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-wa:hover {
            background: #128C7E;
            transform: scale(1.05);
        }

        .btn-wa.sent {
            background: #555;
            cursor: default;
        }

        .btn-copy {
            background: #444;
            color: #ccc;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-left: 5px;
        }

        .btn-copy:hover {
            background: #666;
        }

        .link-text {
            color: #6bb8d4;
            font-size: 0.75rem;
            word-break: break-all;
        }

        .phone-input {
            background: #0f3460;
            border: 1px solid #444;
            border-radius: 5px;
            color: #eee;
            padding: 6px 8px;
            width: 120px;
            font-size: 0.85rem;
        }

        .actions-top {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn-action {
            background: #0f3460;
            color: #6bb8d4;
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-action:hover {
            background: #1a4a7a;
        }
    </style>
</head>

<body>
    <h1>📱 Despacho WhatsApp</h1>
    <p class="subtitle">XV Años de Regina — Envío de invitaciones personalizadas</p>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-num" id="total-guests">0</div>
            <div class="stat-label">Invitados</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="total-sent">0</div>
            <div class="stat-label">Enviados</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="total-pending">0</div>
            <div class="stat-label">Pendientes</div>
        </div>
    </div>

    <div class="config">
        <label>🌐 Dominio base</label>
        <input type="text" class="domain-input" id="base-domain"
            value="https://macintech.netlify.app/xvregina/index.html">

        <label>💬 Mensaje de WhatsApp (usa {nombre} y {link})</label>
        <textarea id="msg-template">¡Hola! 🎉

Estás cordialmente invitado(a) a los XV Años de *Regina*. ✨

Aquí está tu invitación personalizada:
{link}

¡Te esperamos! 💃🎂</textarea>
        <p class="hint">Variables: {nombre} = nombre del invitado, {link} = link personalizado, {pases} = número de
            pases</p>
    </div>

    <div class="actions-top">
        <button class="btn-action" onclick="exportLinks()">📋 Copiar todos los links</button>
        <button class="btn-action" onclick="resetSent()">🔄 Reiniciar enviados</button>
    </div>

    <input type="text" class="search-bar" id="search" placeholder="🔍 Buscar invitado por nombre o ID..."
        oninput="filterTable()">

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Pases</th>
                <th>Teléfono</th>
                <th>Link</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="guests-body"></tbody>
    </table>

    <script>
        let guests = [];
        let sentIds = JSON.parse(localStorage.getItem('xv_sent_ids') || '[]');

        async function loadGuests() {
            try {
                guests = await (await fetch('invitados.json')).json();
            } catch (e) {
                alert('Error cargando invitados.json');
                return;
            }
            renderTable();
            updateStats();
        }

        function getLink(id) {
            const domain = document.getElementById('base-domain').value;
            return `${domain}?id=${id}`;
        }

        function getMessage(guest) {
            const template = document.getElementById('msg-template').value;
            return template
                .replace(/{nombre}/g, guest.name)
                .replace(/{link}/g, getLink(guest.id))
                .replace(/{pases}/g, guest.pases_text);
        }

        function renderTable() {
            const tbody = document.getElementById('guests-body');
            tbody.innerHTML = '';
            guests.forEach(g => {
                const isSent = sentIds.includes(g.id);
                const tr = document.createElement('tr');
                tr.id = `row-${g.id}`;
                if (isSent) tr.classList.add('sent');
                tr.innerHTML = `
                    <td>${g.id}</td>
                    <td><strong>${g.name}</strong></td>
                    <td>${g.pases_text}</td>
                    <td><input type="text" class="phone-input" id="phone-${g.id}" placeholder="52..." value="${g.phone || ''}"></td>
                    <td>
                        <span class="link-text">${getLink(g.id)}</span>
                        <button class="btn-copy" onclick="copyLink(${g.id})">📋</button>
                    </td>
                    <td>
                        <button class="btn-wa ${isSent ? 'sent' : ''}" id="btn-${g.id}" onclick="sendWhatsApp(${g.id})">
                            ${isSent ? '✓ Enviado' : '📲 Enviar'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function sendWhatsApp(id) {
            const guest = guests.find(g => g.id === id);
            const phone = document.getElementById(`phone-${id}`).value.trim();
            const msg = getMessage(guest);

            if (phone) {
                // Clean phone number
                let cleanPhone = phone.replace(/[^0-9]/g, '');
                if (cleanPhone.length === 10) cleanPhone = '52' + cleanPhone;
                window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
            } else {
                // No phone, just copy link
                navigator.clipboard.writeText(getLink(id));
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }

            // Mark as sent
            if (!sentIds.includes(id)) {
                sentIds.push(id);
                localStorage.setItem('xv_sent_ids', JSON.stringify(sentIds));
            }
            const row = document.getElementById(`row-${id}`);
            row.classList.add('sent');
            const btn = document.getElementById(`btn-${id}`);
            btn.textContent = '✓ Enviado';
            btn.classList.add('sent');
            updateStats();
        }

        function copyLink(id) {
            navigator.clipboard.writeText(getLink(id));
            event.target.textContent = '✓';
            setTimeout(() => event.target.textContent = '📋', 1500);
        }

        function filterTable() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#guests-body tr').forEach(tr => {
                const text = tr.textContent.toLowerCase();
                tr.style.display = text.includes(q) ? '' : 'none';
            });
        }

        function updateStats() {
            document.getElementById('total-guests').textContent = guests.length;
            document.getElementById('total-sent').textContent = sentIds.length;
            document.getElementById('total-pending').textContent = guests.length - sentIds.length;
        }

        function exportLinks() {
            const domain = document.getElementById('base-domain').value;
            const lines = guests.map(g => `${g.id}\t${g.name}\t${domain}?id=${g.id}`);
            navigator.clipboard.writeText(lines.join('\n'));
            alert(`✅ ${guests.length} links copiados al portapapeles`);
        }

        function resetSent() {
            if (confirm('¿Reiniciar el conteo de enviados?')) {
                sentIds = [];
                localStorage.setItem('xv_sent_ids', '[]');
                renderTable();
                updateStats();
            }
        }

        // Update links when domain changes
        document.getElementById('base-domain').addEventListener('input', renderTable);

        loadGuests();
    </script>
</body>

</html>
